name: CI

# Restored 2026-04-30 (audit `docs/review/2026-04-28-completion-claims-audit.md`
# § 11 priority 11). Previous incarnation was deleted in commit 5e8b6ea
# (PR #136, "decorative without branch protection") — this one extends the
# coverage to hocuspocus / db / shared / templates plus the Python workspaces
# (apps/worker, packages/llm, apps/tectonic). The release / tag-publish
# workflow (`release.yml`) and Dependabot config (`dependabot.yml`) are
# unaffected and stay where they are.
#
# Branch protection is still off, so this workflow is informational. The
# value comes from the run summary on each PR — broken Dockerfiles, drifted
# i18n keys, ruff regressions, and pyright errors all surface here long
# before someone tries to ship a release tag.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-flight runs when a branch is pushed again — saves Actions minutes
# on chatty branches without sacrificing main-branch coverage.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  PNPM_VERSION: "9.15.0"
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Node — lint, typecheck, unit tests for every TS workspace.
  # apps/api + packages/db tests run real `SELECT 1` queries against Postgres
  # at suite setup, so we spin up a pgvector service and apply migrations
  # before invoking vitest. Web tests are JSDOM-only (no DB) but we run them
  # in this job too so a single Node setup pays for all of them.
  # ─────────────────────────────────────────────────────────────────────────
  node:
    name: Node (lint + typecheck + unit)
    runs-on: ubuntu-latest

    services:
      # pgvector image because schema declares vector columns; pg16 to match
      # docker-compose.yml. ltree + pg_trgm extensions ship in the same
      # image (they're stock postgres-contrib).
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: opencairn
          POSTGRES_USER: opencairn
          POSTGRES_PASSWORD: opencairn-ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opencairn -d opencairn"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Picked up by packages/db's `postgres(process.env.DATABASE_URL!)`,
      # by drizzle-kit migrate, and by every vitest setup file that imports
      # @opencairn/db. Matches the `services.postgres` block above.
      DATABASE_URL: postgresql://opencairn:opencairn-ci@localhost:5432/opencairn
      # Better Auth refuses to boot without a secret >= 32 chars. CI value
      # is irrelevant to test correctness.
      BETTER_AUTH_SECRET: ci-better-auth-secret-32-chars-min-xx
      BETTER_AUTH_URL: http://localhost:4000
      # Internal API HMAC. Same throwaway-value rationale.
      INTERNAL_API_SECRET: ci-internal-api-secret-do-not-use-anywhere
      # Integration token AES-256-GCM key — 32 bytes hex (64 chars).
      INTEGRATION_TOKEN_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      # Better Auth needs a base URL even though tests don't make real
      # outbound calls.
      NEXT_PUBLIC_API_URL: http://localhost:4000

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Drizzle generates the SQL artifacts that the migrate step replays
      # against the service container. Skipping this step makes the next
      # `db:migrate` invocation a no-op against an empty `drizzle/` folder
      # (it ships generated already, but we re-run for safety).
      - name: Generate Drizzle artifacts
        run: pnpm db:generate

      - name: Apply DB migrations
        run: pnpm --filter @opencairn/db db:migrate

      - name: Lint (web — strict, max-warnings 0)
        run: pnpm --filter @opencairn/web lint

      - name: i18n parity (ko ↔ en)
        run: pnpm --filter @opencairn/web i18n:parity

      - name: Typecheck (api)
        run: pnpm --filter @opencairn/api build

      - name: Typecheck (hocuspocus)
        run: pnpm --filter @opencairn/hocuspocus build

      - name: Typecheck (emails)
        run: pnpm --filter @opencairn/emails build

      # Unit tests. apps/api remains advisory until the literature-import
      # vi.mock hoisting + comments-suite 404 setup race are triaged
      # (carried over from the deleted CI in commit 5e8b6ea). Failures
      # still surface in the run summary so visibility stays — flip
      # `continue-on-error: false` once those tests are green again.
      - name: Unit tests (api) — advisory
        run: pnpm --filter @opencairn/api test
        continue-on-error: true

      - name: Unit tests (hocuspocus)
        run: pnpm --filter @opencairn/hocuspocus test

      - name: Unit tests (db)
        run: pnpm --filter @opencairn/db test

      - name: Unit tests (shared)
        run: pnpm --filter @opencairn/shared test

      - name: Unit tests (templates)
        run: pnpm --filter @opencairn/templates test

      - name: Unit tests (emails)
        run: pnpm --filter @opencairn/emails test

      - name: Unit tests (web)
        run: pnpm --filter @opencairn/web test:unit

  # ─────────────────────────────────────────────────────────────────────────
  # Python — apps/worker. Lint (ruff) + typecheck (pyright on src/runtime)
  # + pytest. Integration suite under tests/integration/ self-skips when
  # GEMINI_API_KEY_CI is unset, so we don't ship a key here.
  # ─────────────────────────────────────────────────────────────────────────
  python-worker:
    name: Python (worker)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Pyright (strict on src/runtime)
        run: uv run pyright

      - name: Pytest
        run: uv run pytest -q

  # ─────────────────────────────────────────────────────────────────────────
  # Python — packages/llm.
  # ─────────────────────────────────────────────────────────────────────────
  python-llm:
    name: Python (llm)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/llm
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest -q

  # ─────────────────────────────────────────────────────────────────────────
  # Python — apps/tectonic. The compile fixture self-skips when
  # TECTONIC_BIN is unset (test_compile.py:21), so unit-level coverage
  # (healthz + oversize-input rejection) runs without a LaTeX install.
  # ─────────────────────────────────────────────────────────────────────────
  python-tectonic:
    name: Python (tectonic)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/tectonic
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/tectonic/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Pytest
        run: pytest -q

  # ─────────────────────────────────────────────────────────────────────────
  # Docker build smoke. linux/amd64 only — multi-arch publish lives in
  # release.yml. We build but do not push; a broken Dockerfile fails the
  # PR before merge instead of failing the next release tag.
  # ─────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker build (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [api, web, hocuspocus, worker]
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build apps/${{ matrix.app }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          platforms: linux/amd64
          push: false
          load: false
          tags: opencairn-${{ matrix.app }}:ci
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
