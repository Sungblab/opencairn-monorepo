version: 2

# Weekly cadence keeps PR noise tolerable for a small team while still catching
# CVEs within ~7 days. Security updates ship continuously regardless of this
# schedule — Dependabot's security alert track is independent.
updates:
  # Root + every workspace pnpm manifest. Setting `directory: "/"` with the
  # pnpm package-ecosystem covers the workspace lockfile + every package.json
  # under `apps/*` / `packages/*` automatically.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 8
    groups:
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
      eslint:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
          - "typescript-eslint"
      next:
        patterns:
          - "next"
          - "@next/*"
          - "next-intl"
      plate:
        patterns:
          - "platejs"
          - "@platejs/*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@playwright/*"
          - "@testing-library/*"

  # Python worker.
  - package-ecosystem: "pip"
    directory: "/apps/worker"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 4

  # GitHub Actions versions.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"

  # Docker base images for the three Dockerfiles.
  - package-ecosystem: "docker"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
      day: "monday"
  - package-ecosystem: "docker"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
  - package-ecosystem: "docker"
    directory: "/apps/hocuspocus"
    schedule:
      interval: "weekly"
      day: "monday"
  - package-ecosystem: "docker"
    directory: "/apps/worker"
    schedule:
      interval: "weekly"
      day: "monday"
