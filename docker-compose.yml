services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opencairn}
      POSTGRES_USER: ${POSTGRES_USER:-opencairn}
      # Required. `:?` fails `docker compose` at parse time if unset, so
      # dev/prod never silently boot a database with a shared default
      # password. Set in `.env` (gitignored) or export in the shell.
      # [Tier 1 item 1-6 / Plan 1 C-6]
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  api:
    # Production-ish Hono API image. Profile-gated so the default
    # `docker compose up -d` path still starts only shared infrastructure.
    # Self-host app smoke:
    #   docker compose --profile app up -d api
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql://${POSTGRES_USER:-opencairn}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-opencairn}}
      REDIS_URL: ${COMPOSE_REDIS_URL:-redis://redis:6379}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:4000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      WEB_BASE_URL: ${WEB_BASE_URL:-http://localhost:3000}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:4000}
      PUBLIC_WEB_URL: ${PUBLIC_WEB_URL:-http://localhost:3000}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?set INTERNAL_API_SECRET in .env}
      TEMPORAL_ADDRESS: ${COMPOSE_TEMPORAL_ADDRESS:-temporal:7233}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-ingest}
      S3_ENDPOINT: ${COMPOSE_S3_ENDPOINT:-minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-${MINIO_ROOT_USER:-opencairn-minio}}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?set S3_SECRET_KEY in .env}
      S3_BUCKET: ${S3_BUCKET:-opencairn-uploads}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gemini-3-flash-preview}
      EMBED_MODEL: ${EMBED_MODEL:-gemini-embedding-001}
      TTS_MODEL: ${TTS_MODEL:-gemini-2.5-flash-preview-tts}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_CHAT_MODEL: ${GEMINI_CHAT_MODEL:-gemini-2.5-flash}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      VECTOR_DIM: ${VECTOR_DIM:-768}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-}
      EMAIL_FROM: ${EMAIL_FROM:-OpenCairn <noreply@example.com>}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      INTEGRATION_TOKEN_ENCRYPTION_KEY: ${INTEGRATION_TOKEN_ENCRYPTION_KEY:-}
      FEATURE_CODE_AGENT: ${FEATURE_CODE_AGENT:-false}
      FEATURE_CANVAS_TEMPLATES: ${FEATURE_CANVAS_TEMPLATES:-false}
      FEATURE_CANVAS_OUTPUT_STORE: ${FEATURE_CANVAS_OUTPUT_STORE:-true}
      FEATURE_IMPORT_ENABLED: ${FEATURE_IMPORT_ENABLED:-false}
      FEATURE_DEEP_RESEARCH: ${FEATURE_DEEP_RESEARCH:-false}
      FEATURE_MANAGED_DEEP_RESEARCH: ${FEATURE_MANAGED_DEEP_RESEARCH:-false}
      FEATURE_DOC_EDITOR_SLASH: ${FEATURE_DOC_EDITOR_SLASH:-false}
      SEMANTIC_SCHOLAR_API_KEY: ${SEMANTIC_SCHOLAR_API_KEY:-}
      UNPAYWALL_EMAIL: ${UNPAYWALL_EMAIL:-}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-209715200}
      MAX_IMAGE_BYTES: ${MAX_IMAGE_BYTES:-20971520}
      MAX_AUDIO_VIDEO_BYTES: ${MAX_AUDIO_VIDEO_BYTES:-524288000}
      INGEST_QUARANTINE_PREFIX: ${INGEST_QUARANTINE_PREFIX:-quarantine/}
      INGEST_REPLAY_TTL_SECONDS: ${INGEST_REPLAY_TTL_SECONDS:-3600}
      INGEST_REPLAY_MAX_LEN: ${INGEST_REPLAY_MAX_LEN:-1000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      temporal:
        condition: service_started
      minio:
        condition: service_healthy
    restart: unless-stopped

  web:
    # Production-ish Next.js standalone image. Build-time NEXT_PUBLIC_* args
    # are explicit because Next inlines browser-visible values during `next build`.
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
        NEXT_PUBLIC_HOCUSPOCUS_URL: ${NEXT_PUBLIC_HOCUSPOCUS_URL:-ws://localhost:1234}
        NEXT_PUBLIC_FEATURE_LIVE_INGEST: ${NEXT_PUBLIC_FEATURE_LIVE_INGEST:-true}
        NEXT_PUBLIC_FEATURE_DOC_EDITOR_SLASH: ${NEXT_PUBLIC_FEATURE_DOC_EDITOR_SLASH:-false}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        FEATURE_IMPORT_ENABLED: ${FEATURE_IMPORT_ENABLED:-false}
        FEATURE_DEEP_RESEARCH: ${FEATURE_DEEP_RESEARCH:-false}
        FEATURE_MANAGED_DEEP_RESEARCH: ${FEATURE_MANAGED_DEEP_RESEARCH:-false}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      HOSTNAME: 0.0.0.0
      INTERNAL_API_URL: ${COMPOSE_INTERNAL_API_URL:-http://api:4000}
      FEATURE_IMPORT_ENABLED: ${FEATURE_IMPORT_ENABLED:-false}
      FEATURE_DEEP_RESEARCH: ${FEATURE_DEEP_RESEARCH:-false}
      FEATURE_MANAGED_DEEP_RESEARCH: ${FEATURE_MANAGED_DEEP_RESEARCH:-false}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
      NEXT_PUBLIC_HOCUSPOCUS_URL: ${NEXT_PUBLIC_HOCUSPOCUS_URL:-ws://localhost:1234}
      NEXT_PUBLIC_FEATURE_LIVE_INGEST: ${NEXT_PUBLIC_FEATURE_LIVE_INGEST:-true}
      NEXT_PUBLIC_FEATURE_DOC_EDITOR_SLASH: ${NEXT_PUBLIC_FEATURE_DOC_EDITOR_SLASH:-false}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  hocuspocus:
    # Yjs-over-WebSocket collaboration backend (Plan 2B).
    # Build context is the monorepo root because the Dockerfile copies
    # @opencairn/api + @opencairn/db + @opencairn/shared workspace packages.
    #
    # Behind a profile so default `docker compose up -d` only starts infra —
    # during development we run hocuspocus on the host via `pnpm dev`
    # (tsx watch) for hot-reload. Containerised / prod-smoke runs:
    #   docker compose --profile hocuspocus up -d hocuspocus
    profiles: ["hocuspocus"]
    build:
      context: .
      dockerfile: apps/hocuspocus/Dockerfile
    ports:
      - "1234:1234"
    environment:
      # If DATABASE_URL is unset, build it from the same POSTGRES_USER /
      # POSTGRES_PASSWORD that the `postgres` service requires above — no
      # more baked-in `changeme` fallback. [Tier 1 item 1-6]
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql://${POSTGRES_USER:-opencairn}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-opencairn}}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET in .env}
      HOCUSPOCUS_ORIGINS: ${HOCUSPOCUS_ORIGINS:-http://localhost:3000}
      HOCUSPOCUS_PORT: 1234
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  minio:
    # Dev 환경 S3 호환 스토리지. Production은 Cloudflare R2로 교체.
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-${S3_ACCESS_KEY:-opencairn-minio}}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-${S3_SECRET_KEY}}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    # Optional local LLM runtime for fully-offline / BYOK stacks.
    # Enable with: docker compose --profile ollama up -d ollama
    image: ollama/ollama:latest
    profiles: ["ollama"]
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  temporal:
    # Temporal server for workflow orchestration (Plan 3+).
    # auto-setup image creates the temporal/temporal_visibility schemas in
    # the shared pgvector Postgres on first boot.
    image: temporalio/auto-setup:1.24
    ports:
      # Host port is configurable via TEMPORAL_HOST_PORT (default 7233).
      # Set it to e.g. 17233 on Windows + Hyper-V/WSL, where the
      # 7147-7246 range is excluded from user-bindable ports on some boots.
      # Container-internal DNS (`temporal:7233`) is unaffected, so api/worker
      # running inside compose keep using 7233. Local-only dev (worker on
      # host) must mirror the override in TEMPORAL_ADDRESS.
      - "${TEMPORAL_HOST_PORT:-7233}:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-opencairn}
      # No literal fallback — POSTGRES_PASSWORD is already required at the
      # `postgres` service above (`:?`), so compose fails parse before
      # reaching a stale default. [Tier 1 item 1-6]
      - POSTGRES_PWD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      - POSTGRES_SEEDS=postgres
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.26.2
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

  worker:
    # Python worker hosting Temporal workflows + `runtime.Agent` agents
    # (Plan 3 ingest + Plan 4 Compiler/Research/Librarian).
    #
    # Behind a profile so default `docker compose up -d` only starts infra —
    # during development we usually run the worker on the host via
    # `pnpm --filter @opencairn/worker dev` for faster iteration. Containerised
    # deploys enable this profile:
    #   docker compose --profile worker up -d worker
    #
    # Build context is the monorepo root because the Dockerfile copies both
    # `packages/llm` (workspace dependency) and `apps/worker/**`.
    profiles: ["worker"]
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      - DATABASE_URL=${COMPOSE_DATABASE_URL:-postgresql://${POSTGRES_USER:-opencairn}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-opencairn}}
      - REDIS_URL=${COMPOSE_REDIS_URL:-redis://redis:6379}
      - TEMPORAL_ADDRESS=${COMPOSE_TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_TASK_QUEUE=${TEMPORAL_TASK_QUEUE:-ingest}
      # INTERNAL_API_URL points at the Hono API. For dev where api runs on
      # the host outside compose, use host.docker.internal; production
      # deployments set this to the internal service DNS.
      - INTERNAL_API_URL=${COMPOSE_INTERNAL_API_URL:-http://api:4000}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:?set INTERNAL_API_SECRET in .env}
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gemini-3-flash-preview}
      - EMBED_MODEL=${EMBED_MODEL:-gemini-embedding-001}
      - TTS_MODEL=${TTS_MODEL:-gemini-2.5-flash-preview-tts}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - VECTOR_DIM=${VECTOR_DIM:-768}
      - TRAJECTORY_DIR=/var/opencairn/trajectories
      - S3_ENDPOINT=${COMPOSE_S3_ENDPOINT:-minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-${MINIO_ROOT_USER:-opencairn-minio}}
      - S3_SECRET_KEY=${S3_SECRET_KEY:?set S3_SECRET_KEY in .env}
      - S3_BUCKET=${S3_BUCKET:-opencairn-uploads}
      - S3_USE_SSL=${S3_USE_SSL:-false}
      - MINIO_ENDPOINT=${COMPOSE_S3_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${S3_ACCESS_KEY:-${MINIO_ROOT_USER:-opencairn-minio}}
      - MINIO_SECRET_KEY=${S3_SECRET_KEY:?set S3_SECRET_KEY in .env}
      - FEATURE_CODE_AGENT=${FEATURE_CODE_AGENT:-false}
      - FEATURE_CONTENT_ENRICHMENT=${FEATURE_CONTENT_ENRICHMENT:-false}
      - FEATURE_DEEP_RESEARCH=${FEATURE_DEEP_RESEARCH:-false}
      - FEATURE_MANAGED_DEEP_RESEARCH=${FEATURE_MANAGED_DEEP_RESEARCH:-false}
      - FEATURE_DOC_EDITOR_SLASH=${FEATURE_DOC_EDITOR_SLASH:-false}
      - GEMINI_MANAGED_API_KEY=${GEMINI_MANAGED_API_KEY:-}
      - MANAGED_MARGIN=${MANAGED_MARGIN:-1.3}
      - INTEGRATION_TOKEN_ENCRYPTION_KEY=${INTEGRATION_TOKEN_ENCRYPTION_KEY:-}
      - NOTION_IMPORT_STAGING_DIR=${NOTION_IMPORT_STAGING_DIR:-/var/opencairn/import-staging}
      - SEMANTIC_SCHOLAR_API_KEY=${SEMANTIC_SCHOLAR_API_KEY:-}
      - UNPAYWALL_EMAIL=${UNPAYWALL_EMAIL:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
    volumes:
      - worker_trajectories:/var/opencairn/trajectories
      - worker_import_staging:/var/opencairn/import-staging
    extra_hosts:
      # Linux docker engines don't resolve host.docker.internal by default.
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
  ollama_data:
  worker_trajectories:
  worker_import_staging:
