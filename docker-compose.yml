services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: opencairn
      POSTGRES_USER: opencairn
      POSTGRES_PASSWORD: changeme
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opencairn -d opencairn"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  hocuspocus:
    # Yjs-over-WebSocket collaboration backend (Plan 2B).
    # Build context is the monorepo root because the Dockerfile copies
    # @opencairn/api + @opencairn/db + @opencairn/shared workspace packages.
    build:
      context: .
      dockerfile: apps/hocuspocus/Dockerfile
    ports:
      - "1234:1234"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgres://opencairn:changeme@postgres:5432/opencairn}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET in .env}
      - HOCUSPOCUS_ORIGINS=${HOCUSPOCUS_ORIGINS:-http://localhost:3000}
      - HOCUSPOCUS_PORT=1234
      - NODE_ENV=${NODE_ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  minio:
    # Dev 환경 S3 호환 스토리지. Production은 Cloudflare R2로 교체.
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    # Optional local LLM runtime for fully-offline / BYOK stacks.
    # Enable with: docker compose --profile ollama up -d ollama
    image: ollama/ollama:latest
    profiles: ["ollama"]
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  temporal:
    # Temporal server for workflow orchestration (Plan 3+).
    # auto-setup image creates the temporal/temporal_visibility schemas in
    # the shared pgvector Postgres on first boot.
    image: temporalio/auto-setup:1.24
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-opencairn}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_SEEDS=postgres
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.26.2
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

  worker:
    # Python worker hosting Temporal workflows + LangGraph agents
    # (Plan 3 ingest + Plan 4 Compiler/Research/Librarian).
    #
    # Behind a profile so default `docker compose up -d` only starts infra —
    # during development we usually run the worker on the host via
    # `pnpm --filter @opencairn/worker dev` for faster iteration. Containerised
    # deploys enable this profile:
    #   docker compose --profile worker up -d worker
    #
    # Build context is the monorepo root because the Dockerfile copies both
    # `packages/llm` (workspace dependency) and `apps/worker/**`.
    profiles: ["worker"]
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgres://opencairn:changeme@postgres:5432/opencairn}
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_TASK_QUEUE=${TEMPORAL_TASK_QUEUE:-ingest}
      # INTERNAL_API_URL points at the Hono API. For dev where api runs on
      # the host outside compose, use host.docker.internal; production
      # deployments set this to the internal service DNS.
      - INTERNAL_API_URL=${INTERNAL_API_URL:-http://host.docker.internal:4000}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:?set INTERNAL_API_SECRET in .env}
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - VECTOR_DIM=${VECTOR_DIM:-768}
      - TRAJECTORY_DIR=/var/opencairn/trajectories
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - worker_trajectories:/var/opencairn/trajectories
    extra_hosts:
      # Linux docker engines don't resolve host.docker.internal by default.
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
  ollama_data:
  worker_trajectories:
